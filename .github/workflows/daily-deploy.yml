name: Manual Deploy to GitHub Pages

on:
  workflow_dispatch:  # manual trigger only — daily news is now handled by create-news-issue.yml + Copilot

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,fetch_news.py,news_prompt.md,setup.sh,*.md'
          force_orphan: false

